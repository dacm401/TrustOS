name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-r1:
    name: R1 Mock Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:r1
      - run: npx tsc --noEmit

  test-repos:
    name: Repository Tests (with PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: smartrouter_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smartrouter_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Init schema
        run: psql $DATABASE_URL -f src/db/schema.sql
      - run: npm run test:repos

  test-frontend:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  benchmark:
    name: Routing Benchmark Gate
    runs-on: ubuntu-latest
    needs: [test-r1, test-repos]
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: smartrouter_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smartrouter_test
      NODE_ENV: production
      # SiliconFlow API key (set in GitHub repo secrets as SILICONFLOW_API_KEY)
      API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Init schema
        run: psql $DATABASE_URL -f src/db/schema.sql
        working-directory: backend
      # Start backend in background, wait for it to be ready
      - name: Start backend server
        run: |
          nohup npx hono start > /tmp/backend.log 2>&1 &
          echo "Backend PID: $!"
          # Wait up to 30s for the server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            sleep 1
          done
          if ! curl -s http://localhost:3001/api/health > /dev/null 2>&1; then
            echo "Backend failed to start. Log:"
            cat /tmp/backend.log
            exit 1
          fi
        working-directory: backend
      # Run routing benchmark in CI mode
      - name: Run Routing Benchmark
        run: |
          npx tsx evaluation/runner.ts --suite routing --json-out
        working-directory: backend
        env:
          API_BASE: http://localhost:3001
          BENCHMARK_USER_ID: ci-benchmark-user
          CI_THRESHOLD_MODE: 50
          CI_THRESHOLD_INTENT: 70
