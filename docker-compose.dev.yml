services:
  # postgres 使用外部已有实例（smartrouter-pro-postgres-1，端口 5432）
  # DATABASE_URL 已改为 host.docker.internal:5432

  backend:
    image: backend_real-backend:latest
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5432/smartrouter
      NODE_ENV: production
      ALLOW_DEV_FALLBACK: "true"
      STORAGE_BACKEND: "local"
      LOCAL_ARCHIVE_PATH: "/app/data/archive"
      # JWT Auth (Sprint 48)
      JWT_SECRET: "dev-secret-for-testing-only-32chars!"
      JWT_ENABLED: "true"
      JWT_EXPIRES_IN: "86400"
      AUTH_USERS: "admin:changeme"
      # 模型
      FAST_MODEL: "Qwen/Qwen2.5-7B-Instruct"
      SLOW_MODEL: "Qwen/Qwen2.5-72B-Instruct"
      OPENAI_API_KEY: "sk-iewslddrpfiwsqyctiiquktrwhubgvqyywspurlpbyonrdaf"
      OPENAI_BASE_URL: "https://api.siliconflow.cn/v1"
    depends_on: []  # postgres 由宿主机直接提供

  frontend:
    image: smartrouter-pro-frontend:latest
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
